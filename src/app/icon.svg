<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" /> <!-- slate-900 -->
      <stop offset="100%" stop-color="#020617" /> <!-- slate-950 -->
    </linearGradient>
    <linearGradient id="p" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9333ea" /> <!-- purple-600 -->
      <stop offset="50%" stop-color="#6366f1" /> <!-- indigo-500 -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- blue-500 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Sleek Dark Background -->
  <rect width="120" height="120" rx="28" fill="url(#bg)" />
  
  <!-- Glowing Blue/Purple P Shape -->
  <g transform="translate(35, 25)" filter="url(#glow)">
    <path d="M 0 0 L 25 0 C 42 0 50 12 50 25 C 50 38 42 50 25 50 L 15 50 L 15 70 L 0 70 Z M 15 15 L 15 35 L 25 35 C 32 35 35 30 35 25 C 35 20 32 15 25 15 Z" fill="url(#p)" />
  </g>
</svg>
